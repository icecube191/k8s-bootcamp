name: CI — Build & Push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/task-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to push the tag update back to repo
      packages: write   # needed to push to GHCR

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # auto-provided

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Update values.yaml with new image tag so ArgoCD detects the change
      - name: Update Helm values with new image tag
        if: github.ref == 'refs/heads/main'
        run: |
          SHA_TAG="sha-$(echo ${{ github.sha }} | cut -c1-7)"
          sed -i "s/^  tag:.*/  tag: ${SHA_TAG}/" helm/task-api/values.yaml

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add helm/task-api/values.yaml
          git diff --staged --quiet || git commit -m "ci: update image to ${SHA_TAG} [skip ci]"
          git push