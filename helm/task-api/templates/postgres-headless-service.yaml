apiVersion: v1
kind: Service
metadata:
  name: postgres-headless      # StatefulSet pods register themselves here
  namespace: {{ .Values.namespace }}
spec:
  clusterIP: None              # "None" = headless. No virtual IP. Direct pod DNS.
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
# This gives each pod a stable DNS name:
# postgres-0.postgres-headless.bootcamp2.svc.cluster.local
# postgres-1.postgres-headless.bootcamp2.svc.cluster.local
# Required by StatefulSet spec.serviceName
