apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: task-api
  namespace: argocd        # ArgoCD always lives in the argocd namespace
spec:
  project: default
 
  source:
    repoURL: https://github.com/icecube191/k8s-bootcamp.git
    targetRevision: main   # Watch the main branch
    path: helm/task-api    # Path to the Helm chart in the repo
 
  destination:
    server: https://kubernetes.default.svc   # This cluster
    namespace: bootcamp2
 
  syncPolicy:
    automated:
      prune: true          # Delete resources removed from Git
      selfHeal: true       # Revert manual changes (drift correction)
    syncOptions:
      - CreateNamespace=true
